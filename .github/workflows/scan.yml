name: Knowledge Scan

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: python scripts/run_scan.py

      - name: Commit and push new notes
        run: |
          git config user.name "primebot-knowledge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add notes/ data/seen.json
          if git diff --cached --quiet; then
            echo "Sin cambios, nada que commitear."
          else
            git commit -m "scan: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
