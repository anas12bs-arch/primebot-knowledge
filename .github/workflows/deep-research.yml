name: Deep Research

on:
  schedule:
    - cron: "0 4 * * *"
  push:
    paths:
      - "gaps/pending.md"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: repo-writes
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deep research on pending gaps
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/gap_research.py

      - name: Commit and push briefs
        run: |
          git config user.name "primebot-knowledge-bot"
          git config user.email "actions@users.noreply.github.com"
          git add notes/ gaps/
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "research: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
