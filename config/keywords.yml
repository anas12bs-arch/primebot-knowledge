# Subreddits públicos (JSON endpoint, sin auth)
# NOTA: Reddit bloquea sistemáticamente tráfico automatizado (403 incluso con
# user-agent de navegador). Se deja el fetcher como best-effort (falla en
# silencio si Reddit bloquea) pero no se depende de él — cubierto via RSS.
subreddits:
  - artificial
  - MachineLearning
  - marketing
  - Entrepreneur
  - SaaS
  - automation

# Ventana de "reciente" en horas — descarta contenido más viejo
max_age_hours: 36
